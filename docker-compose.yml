version: '3.9'

services:
  # ── Backend + Frontend (production mode) ──────────────────
  app:
    build: .
    ports:
      - "8000:7860"
    volumes:
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker for sandbox
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
    restart: unless-stopped

  # ── Frontend dev server (development only) ─────────────────
  frontend-dev:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    profiles: ["dev"]

  # ── Backend dev server (development only) ─────────────────
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-builder   # stop before second stage
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    profiles: ["dev"]
